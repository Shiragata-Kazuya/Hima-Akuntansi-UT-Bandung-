<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init('YeViBJxZKDbLYSgCt');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIMA AKUNTANSI UT BANDUNG</title>

    <!--
        ✅ FIX: X-Frame-Options DIHAPUS dari meta tag.
        Meta tag X-Frame-Options tidak diproses oleh browser — hanya berlaku
        jika dikirim sebagai HTTP Response Header dari server.
        Tambahkan header ini di konfigurasi server (Nginx/Apache/Firebase Hosting).

        ✅ FIX CSP: Ditambahkan https://www.gstatic.com ke connect-src dan script-src
        agar Firebase SDK (.js.map) tidak diblokir CSP.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com;
               style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com;
               img-src 'self' data: https:;
               font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
               connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://api.emailjs.com; https://www.gstatic.com https://firebase.googleapis.com;
               frame-src 'self' https://*.google.com;">

    <!-- Security Headers yang valid di meta tag -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

    <!-- Tailwind CSS (gunakan Tailwind CLI untuk production) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#0a192f', 900: '#020c1b' },
                        gold: { 400: '#FFD700', 500: '#D4AF37', 600: '#AA8C2C' }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-50 bg-navy-900 text-white shadow-lg border-b border-gold-600/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer" onclick="Navigation.showPage('home')">
                    <img src="https://drive.google.com/thumbnail?id=1PvWeGh2phyjadC_gaOkStQN7YMZc7Fy7"
                         class="w-12 h-12 rounded-full shadow-md object-cover"
                         alt="Logo HIMA AKUNTANSI">
                    <div class="flex flex-col">
                        <span class="font-bold text-lg tracking-wider text-gold-400">HIMA AKUNTANSI</span>
                        <span class="text-xs text-gray-300 tracking-widest">UT BANDUNG</span>
                    </div>
                </div>

                <!-- Menu Desktop -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <button onclick="Navigation.showPage('home')" id="nav-home"
                                class="nav-btn hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            Beranda
                        </button>
                        <button onclick="Navigation.showPage('kegiatan')" id="nav-kegiatan"
                                class="nav-btn hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            Kegiatan
                        </button>
                        <button onclick="Navigation.showPage('struktur')" id="nav-struktur"
                                class="nav-btn hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            Struktur Organisasi
                        </button>
                        <button onclick="Navigation.showPage('kontak')" id="nav-kontak"
                                class="nav-btn hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">
                            Kontak
                        </button>
                    </div>
                </div>

                <!-- Menu Mobile Button -->
                <div class="-mr-2 flex md:hidden">
                    <button onclick="Navigation.toggleMobileMenu()" type="button"
                            class="bg-navy-800 inline-flex items-center justify-center p-2 rounded-md text-gold-400 hover:text-white hover:bg-navy-700 focus:outline-none"
                            aria-label="Toggle menu">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Menu Mobile Content -->
        <div class="md:hidden hidden bg-navy-800 border-t border-navy-700" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <button onclick="Navigation.showPage('home')"
                        class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-white hover:text-gold-400 hover:bg-navy-900">
                    Beranda
                </button>
                <button onclick="Navigation.showPage('kegiatan')"
                        class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-white hover:text-gold-400 hover:bg-navy-900">
                    Kegiatan
                </button>
                <button onclick="Navigation.showPage('struktur')"
                        class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-white hover:text-gold-400 hover:bg-navy-900">
                    Struktur
                </button>
                <button onclick="Navigation.showPage('kontak')"
                        class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-white hover:text-gold-400 hover:bg-navy-900">
                    Kontak
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-20 min-h-screen bg-gray-50">
        <div id="page-home"></div>
        <div id="page-kegiatan"></div>
        <div id="page-struktur"></div>
        <div id="page-kontak"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-navy-900 text-white py-8 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gold-500 font-bold mb-2">HIMA AKUNTANSI UT BANDUNG</p>
            <p class="text-gray-400 text-sm">© 2024 Kabinet Sinergi. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!--
        =====================================================================
        URUTAN SCRIPT — PENTING
        =====================================================================
        1. Script biasa (non-module) dimuat lebih dulu secara sinkron:
           utils, security, navigation, carousel.
           Ini memastikan window.Navigation sudah terdefinisi sebelum
           init.js (ES Module) dijalankan.

        2. ES Module (init.js) dimuat terakhir dengan type="module".
           Browser otomatis men-defer module — artinya ia menunggu DOM
           selesai diparse, LALU baru dieksekusi. Ini aman.

        3. init.js menggunakan polling untuk memastikan Navigation siap
           sebelum dipatch, menghilangkan race condition sepenuhnya.
        =====================================================================
    -->

    <!-- [1] Script utilitas global — NON-MODULE, sinkron -->
    <script src="js/utils.js"></script>
    <script src="js/security.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/carousel.js"></script>

    <!-- [2] Entry point ES Module — otomatis deferred oleh browser -->
    <script type="module" src="js/init.js"></script>

</body>
</html>
